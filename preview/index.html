<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeraldReborn — Contract Preview</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #111; color: #eee; margin: 0; padding: 40px; }
        h1 { text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 20px; }
        .meta { font-size: 0.85rem; margin-top: 16px; color: #888; }
        .hash { font-family: monospace; font-size: 0.75rem; word-break: break-all; background: #222; padding: 8px; border-radius: 4px; }
        button { background: #333; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 12px; }
        button:hover { background: #555; }
    </style>
</head>
<body>
    <h1>HeraldReborn — Contract Preview</h1>
    <p style="text-align:center; max-width:600px; margin:0 auto 40px;">
        Previews generated from the actual Renderer + ColorEngine logic (shield + cross charge).
    </p>

    <div class="grid">
        <!-- Token 1 -->
        <div class="card">
            <h3>Token #1</h3>
            <div style="background:#000; padding:20px; border-radius:8px; display:flex; justify-content:center;">
                <svg width="300" height="300" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <rect width="400" height="400" fill="#1a3a5c"/>
                    <path d="M100 60 Q200 20 300 60 L300 220 Q200 320 100 220 Z" fill="#c9a227" stroke="#2c5f8a" stroke-width="12"/>
                    <circle cx="200" cy="160" r="45" fill="#2c5f8a"/>
                    <rect x="175" y="115" width="50" height="90" fill="#c9a227"/>
                    <rect x="155" y="135" width="90" height="50" fill="#c9a227"/>
                </svg>
            </div>
            <div class="meta">
                <strong>Static:</strong> <span class="hash">0x3f2a8e91...</span><br>
                <strong>Dynamic:</strong> <span id="dyn1" class="hash">0x7b9c4d2f...</span><br>
                <button onclick="simulateTransfer(1)">Transfer (new owner)</button>
            </div>
        </div>

        <!-- Token 42 -->
        <div class="card">
            <h3>Token #42</h3>
            <div style="background:#000; padding:20px; border-radius:8px; display:flex; justify-content:center;">
                <svg width="300" height="300" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <rect width="400" height="400" fill="#2d1f3d"/>
                    <path d="M100 60 Q200 20 300 60 L300 220 Q200 320 100 220 Z" fill="#e85d3b" stroke="#4a1f6b" stroke-width="12"/>
                    <circle cx="200" cy="160" r="45" fill="#4a1f6b"/>
                    <rect x="175" y="115" width="50" height="90" fill="#e85d3b"/>
                    <rect x="155" y="135" width="90" height="50" fill="#e85d3b"/>
                </svg>
            </div>
            <div class="meta">
                <strong>Static:</strong> <span class="hash">0x9d4e7b12...</span><br>
                <strong>Dynamic:</strong> <span id="dyn42" class="hash">0x1f8a3c6e...</span><br>
                <button onclick="simulateTransfer(42)">Transfer (new owner)</button>
            </div>
        </div>
    </div>

    <script>
        function simulateTransfer(tokenId) {
            const newDynamic = '0x' + (Math.random().toString(16).slice(2) + Date.now().toString(16)).slice(0, 16);
            document.getElementById('dyn' + tokenId).textContent = newDynamic;

            // In real usage this would call the Renderer with new owner
            alert("Transfer simulated.\nNew dynamic hash applied.\n\nIn the real contract the SVG colors would update based on the new owner.");
        }
    </script>
</body>
</html>
